<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Void.Store</title>
  <meta name="theme-color" content="#080808">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="Void.Store">
  <link rel="stylesheet" href="style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
  <header class="topbar">
    <div class="logo">VOID<span>.STORE</span></div>
    <div class="topbar-right">
      <span class="status-text" id="subtitle">瀏覽精選商品</span>
      <div class="member-chip" id="memberChip" hidden>
        <img class="member-avatar" id="memberAvatar" alt="" hidden>
        <span id="memberLabel"></span>
      </div>
      <button class="tb-btn tb-btn-login" id="memberLoginBtn" type="button">登入</button>
      <button class="tb-btn" id="memberLogoutBtn" type="button" hidden>登出</button>
      <button class="tb-btn tb-btn-null" id="loginBtn" type="button">_null</button>
      <button class="tb-btn" id="adminLogoutBtn" type="button" hidden>LOGOUT</button>
    </div>
  </header>

  <div class="main">
    <aside class="sidebar" id="uploadSection" hidden aria-hidden="true">
      <div class="sidebar-scroll">
        <section class="ss">
          <div class="sec-label">新增商品</div>
          <form id="uploadForm" enctype="multipart/form-data">
            <div class="form-stack">
              <label class="field-label" for="name">名稱 <span class="req">*</span></label>
              <input class="field-input" type="text" id="name" name="name" placeholder="手工陶瓷杯" required>

              <label class="field-label" for="price">價格 NT$ <span class="req">*</span></label>
              <input class="field-input" type="number" id="price" name="price" placeholder="0" min="0" step="1" required>

              <label class="field-label" for="category">分類</label>
              <select class="sel" id="category" name="category">
                <option value="服飾">服飾</option>
                <option value="食品">食品</option>
                <option value="3C電子">3C電子</option>
                <option value="居家生活">居家生活</option>
                <option value="美妝保養">美妝保養</option>
                <option value="其他" selected>其他</option>
              </select>

              <label class="field-label" for="description">描述</label>
              <textarea class="prompt-area" id="description" name="description" rows="3" placeholder="商品特色、規格..."></textarea>

              <label class="field-label">圖片</label>
              <div class="img-upload" id="dropZone">
                <input type="file" id="image" name="image" accept="image/*" hidden>
                <div class="drop-content" id="dropContent">
                  <span class="ul">拖曳或 <button type="button" class="link-btn" id="browseBtn">選擇檔案</button></span>
                  <span class="hint">JPG / PNG / WebP · 5MB</span>
                </div>
                <div class="preview" id="preview" hidden>
                  <img id="previewImg" alt="預覽">
                  <button type="button" class="remove-btn" id="removeImage" title="移除">✕</button>
                </div>
              </div>
            </div>
          </form>
        </section>
      </div>
      <div class="gen-wrap">
        <button type="submit" form="uploadForm" class="gen-btn" id="submitBtn">
          <span class="btn-text">UPLOAD</span>
          <span class="btn-loading" hidden>UPLOADING...</span>
        </button>
      </div>
    </aside>

    <div class="center">
      <div class="center-tabs">
        <div class="center-tab active">GALLERY</div>
      </div>
      <div class="gallery-view" id="galleryView">
        <div class="gallery-grid" id="productsGrid">
          <div class="empty-state" id="emptyState">
            <span class="empty-icon">◌</span>
            <span class="empty-text">尚無商品</span>
          </div>
        </div>
      </div>
    </div>
  </div>

  <footer class="statusbar">
    <div class="sb-item" id="productCount">0 ITEMS</div>
    <div class="sb-item" id="modeLabel">VIEWER</div>
    <div class="sb-item sb-public" id="publicUrlLabel" hidden></div>
  </footer>

  <div class="modal-bg" id="imageLightbox">
    <button class="lb-close" id="closeLightbox" type="button" aria-label="關閉">✕</button>
    <div class="lb-body">
      <div class="lb-image-wrap" id="lightboxImageWrap">
        <img class="lb-image" id="lightboxImage" alt="">
        <div class="lb-placeholder" id="lightboxPlaceholder" hidden>◌</div>
      </div>
      <div class="lb-panel">
        <span class="card-badge" id="lightboxCategory"></span>
        <h2 class="lb-title" id="lightboxName"></h2>
        <p class="lb-desc" id="lightboxDesc"></p>
        <div class="lb-meta">
          <span class="lb-price" id="lightboxPrice"></span>
          <div class="lb-actions">
            <button class="action-btn" id="lightboxShareBtn" type="button">SHARE</button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div class="modal-overlay" id="memberModal">
    <div class="modal member-modal">
      <div class="sec-label">會員登入</div>
      <div class="member-login-header">
        <div class="google-badge" aria-hidden="true">
          <svg viewBox="0 0 24 24" width="22" height="22"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 0 1-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
        </div>
        <p class="modal-desc">預設使用 Google 帳號登入</p>
      </div>
      <div class="google-signin-wrap" id="googleSignInWrap">
        <div id="googleSignInBtn"></div>
      </div>
      <p class="modal-note">僅蒐集 Email 作為會員識別，可隨時登出</p>
      <p class="modal-hint" id="googleSetupHint" hidden>
        請在 Render 設定 GOOGLE_CLIENT_ID 環境變數以啟用 Google 登入
      </p>
      <div class="modal-actions modal-actions-center">
        <button type="button" class="tb-btn" id="cancelMemberLogin">取消</button>
      </div>
    </div>
  </div>

  <div class="modal-overlay" id="loginModal">
    <div class="modal">
      <div class="sec-label">_null</div>
      <p class="modal-desc">輸入密碼以管理商品</p>
      <form id="loginForm">
        <input class="field-input" type="password" id="adminPassword" placeholder="PASSWORD" autocomplete="current-password" required>
        <div class="modal-actions">
          <button type="button" class="tb-btn" id="cancelLogin">CANCEL</button>
          <button type="submit" class="gen-btn gen-btn-sm">LOGIN</button>
        </div>
      </form>
    </div>
  </div>

  <div class="toast" id="toast" hidden></div>

  <script src="https://accounts.google.com/gsi/client" async defer></script>
  <script src="app.js"></script>
</body>
</html>
