<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Void.Store</title>
  <meta name="theme-color" content="#080808">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="Void.Store">
  <link rel="stylesheet" href="style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
  <header class="topbar">
    <div class="logo">VOID<span>.STORE</span></div>
    <div class="topbar-right">
      <span class="status-text" id="subtitle">瀏覽精選商品</span>
      <button class="tb-btn tb-btn-line" id="lineGroupBtn" type="button" hidden>LINE 群組</button>
      <button class="tb-btn" id="cartBtn" type="button">CART <span class="cart-badge" id="cartBadge" hidden>0</span></button>
      <button class="tb-btn tb-btn-null" id="loginBtn" type="button">_null</button>
      <button class="tb-btn" id="changePasswordBtn" type="button" hidden>PASSWORD</button>
      <button class="tb-btn" id="adminLogoutBtn" type="button" hidden>LOGOUT</button>
    </div>
  </header>

  <div class="main">
    <aside class="sidebar" id="uploadSection" hidden aria-hidden="true">
      <div class="sidebar-scroll">
        <section class="ss">
          <div class="sec-label">新增商品</div>
          <form id="uploadForm" enctype="multipart/form-data">
            <div class="form-stack">
              <label class="field-label" for="name">名稱 <span class="req">*</span></label>
              <input class="field-input" type="text" id="name" name="name" placeholder="手工陶瓷杯" required>

              <label class="field-label" for="price">價格 NT$ <span class="req">*</span></label>
              <input class="field-input" type="number" id="price" name="price" placeholder="0" min="0" step="1" required>

              <label class="field-label" for="series">系列</label>
              <select class="sel" id="series" name="series">
                <option value="nullcraft" selected>nullcraft</option>
                <option value="二手選品">二手選品</option>
                <option value="礦石">礦石</option>
              </select>

              <label class="field-label" for="category">品項</label>
              <select class="sel" id="category" name="category">
                <option value="銀飾">銀飾</option>
                <option value="墜飾">墜飾</option>
                <option value="耳環">耳環</option>
                <option value="戒指">戒指</option>
                <option value="服飾">服飾</option>
                <option value="食品">食品</option>
                <option value="3C電子">3C電子</option>
                <option value="居家生活">居家生活</option>
                <option value="美妝保養">美妝保養</option>
                <option value="其他" selected>其他</option>
              </select>

              <label class="field-label" for="stockType">屬性</label>
              <select class="sel" id="stockType" name="stock_type">
                <option value="現貨" selected>現貨</option>
                <option value="AI製">AI製</option>
              </select>

              <label class="field-label" for="description">描述</label>
              <textarea class="prompt-area" id="description" name="description" rows="3" placeholder="商品特色、規格..."></textarea>

              <label class="field-label" for="image">圖片</label>
              <div class="img-upload" id="dropZone">
                <input type="file" id="image" name="image" accept="image/jpeg,image/png,image/webp,image/gif" class="file-input-overlay">
                <div class="drop-content" id="dropContent">
                  <span class="ul">點擊選擇圖片</span>
                  <span class="hint">JPG / PNG / WebP · 5MB</span>
                </div>
                <div class="preview" id="preview" hidden>
                  <img id="previewImg" alt="預覽">
                  <label class="replace-img-label" for="image">更換</label>
                  <button type="button" class="remove-btn" id="removeImage" title="移除">✕</button>
                </div>
              </div>
            </div>
          </form>
        </section>
      </div>
      <div class="gen-wrap">
        <button type="submit" form="uploadForm" class="gen-btn" id="submitBtn">
          <span class="btn-text">UPLOAD</span>
          <span class="btn-loading" hidden>UPLOADING...</span>
        </button>
      </div>
    </aside>

    <div class="center">
      <div class="center-tabs">
        <div class="center-tab active">GALLERY</div>
      </div>
      <div class="gallery-body">
        <div class="gallery-view" id="galleryView">
        <section class="line-cta-banner" id="lineCtaBanner" hidden>
          <div class="line-cta-copy">
            <span class="line-cta-title">想看最新上架？</span>
            <span class="line-cta-desc">加入官方 LINE 群組，掌握新品與優惠</span>
          </div>
          <div class="line-cta-actions">
            <button type="button" class="line-btn" id="lineGroupBannerBtn" hidden>加入群組</button>
          </div>
        </section>
        <section class="recent-section" id="recentSection" hidden>
          <div class="recent-header">
            <span class="sec-label">最近瀏覽</span>
            <button type="button" class="link-btn" id="clearHistoryBtn">清除</button>
          </div>
          <div class="recent-grid" id="recentGrid"></div>
        </section>
        <div class="gallery-grid" id="productsGrid">
          <div class="empty-state" id="emptyState">
            <span class="empty-icon">◌</span>
            <span class="empty-text">尚無商品</span>
          </div>
        </div>
        </div>
        <aside class="gallery-filter" id="galleryFilter" aria-label="分類檢視">
          <div class="sec-label">分類檢視</div>
          <nav class="filter-tags" id="filterTags">
            <button type="button" class="filter-tag active" data-series="all">ALL</button>
            <button type="button" class="filter-tag" data-series="nullcraft">nullcraft</button>
            <button type="button" class="filter-tag" data-series="二手選品">二手選品</button>
            <button type="button" class="filter-tag" data-series="礦石">礦石</button>
          </nav>
        </aside>
      </div>
    </div>
  </div>

  <footer class="statusbar">
    <div class="sb-item" id="productCount">0 ITEMS</div>
    <div class="sb-item" id="modeLabel">VIEWER</div>
    <div class="sb-item sb-public" id="publicUrlLabel" hidden></div>
  </footer>

  <div class="modal-bg" id="imageLightbox">
    <button class="lb-close" id="closeLightbox" type="button" aria-label="關閉">✕</button>
    <div class="lb-body">
      <div class="lb-image-wrap" id="lightboxImageWrap">
        <img class="lb-image" id="lightboxImage" alt="">
        <div class="lb-placeholder" id="lightboxPlaceholder" hidden>◌</div>
      </div>
      <div class="lb-panel">
        <div class="lb-badges">
          <span class="card-badge" id="lightboxCategory"></span>
          <span class="card-type-badge" id="lightboxStockType" hidden></span>
          <span class="sold-badge" id="lightboxSoldBadge" hidden>SOLD</span>
        </div>
        <h2 class="lb-title" id="lightboxName"></h2>
        <p class="lb-desc" id="lightboxDesc"></p>
        <div class="lb-meta">
          <span class="lb-price" id="lightboxPrice"></span>
          <div class="lb-actions" id="lightboxGuestActions">
            <button class="action-btn" id="lightboxCartBtn" type="button">ADD CART</button>
            <button class="action-btn" id="lightboxShareBtn" type="button">SHARE</button>
          </div>
          <div class="lb-actions" id="lightboxAdminActions" hidden>
            <button class="action-btn" id="lightboxSoldBtn" type="button">SOLD</button>
            <button class="action-btn" id="lightboxEditBtn" type="button">EDIT</button>
            <button class="action-btn action-btn-danger" id="lightboxDeleteBtn" type="button">DEL</button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div class="cart-drawer-bg" id="cartDrawerBg">
    <aside class="cart-drawer" id="cartDrawer" aria-label="購物車">
      <div class="cart-drawer-head">
        <span class="sec-label">購物車</span>
        <button type="button" class="lb-close cart-close" id="closeCartBtn" aria-label="關閉">✕</button>
      </div>
      <p class="cart-hint">選好商品後，可 <strong>複製清單</strong> 貼到官方 LINE 群組詢價</p>
      <div class="cart-list" id="cartList"></div>
      <div class="cart-footer" id="cartFooter" hidden>
        <div class="cart-total">
          <span>合計</span>
          <span id="cartTotal">NT$ 0</span>
        </div>
        <div class="cart-footer-actions">
          <button type="button" class="tb-btn" id="clearCartBtn">清空</button>
          <button type="button" class="tb-btn" id="copyCartBtn">複製清單</button>
        </div>
      </div>
    </aside>
  </div>

  <div class="modal-overlay" id="editModal">
    <div class="modal modal--edit">
      <div class="sec-label">編輯商品</div>
      <form id="editForm" enctype="multipart/form-data">
        <input type="hidden" id="editId" name="id">
        <div class="form-stack">
          <label class="field-label" for="editName">名稱 <span class="req">*</span></label>
          <input class="field-input" type="text" id="editName" name="name" required>

          <label class="field-label" for="editPrice">價格 NT$ <span class="req">*</span></label>
          <input class="field-input" type="number" id="editPrice" name="price" min="0" step="1" required>

          <label class="field-label" for="editSeries">系列</label>
          <select class="sel" id="editSeries" name="series">
            <option value="nullcraft">nullcraft</option>
            <option value="二手選品">二手選品</option>
            <option value="礦石">礦石</option>
          </select>

          <label class="field-label" for="editCategory">品項</label>
          <select class="sel" id="editCategory" name="category">
            <option value="銀飾">銀飾</option>
            <option value="墜飾">墜飾</option>
            <option value="耳環">耳環</option>
            <option value="戒指">戒指</option>
            <option value="服飾">服飾</option>
            <option value="食品">食品</option>
            <option value="3C電子">3C電子</option>
            <option value="居家生活">居家生活</option>
            <option value="美妝保養">美妝保養</option>
            <option value="其他">其他</option>
          </select>

          <label class="field-label" for="editStockType">屬性</label>
          <select class="sel" id="editStockType" name="stock_type">
            <option value="現貨">現貨</option>
            <option value="AI製">AI製</option>
          </select>

          <label class="field-check">
            <input type="checkbox" id="editSold" name="sold" value="1">
            <span>標記為已售出 (SOLD)</span>
          </label>

          <label class="field-label" for="editDescription">描述</label>
          <textarea class="prompt-area" id="editDescription" name="description" rows="3" placeholder="商品特色、規格..."></textarea>

          <label class="field-label">圖片</label>
          <div class="edit-current-img" id="editCurrentImgWrap" hidden>
            <img id="editCurrentImg" alt="目前圖片">
            <span class="hint">目前圖片（上傳新檔可替換）</span>
          </div>
          <div class="img-upload" id="editDropZone">
            <input type="file" id="editImage" name="image" accept="image/jpeg,image/png,image/webp,image/gif" class="file-input-overlay">
            <div class="drop-content" id="editDropContent">
              <span class="ul">點擊選擇新圖片</span>
              <span class="hint">選填 · JPG / PNG / WebP · 5MB</span>
            </div>
            <div class="preview" id="editPreview" hidden>
              <img id="editPreviewImg" alt="新圖片預覽">
              <label class="replace-img-label" for="editImage">更換</label>
              <button type="button" class="remove-btn" id="editRemoveImage" title="移除">✕</button>
            </div>
          </div>
        </div>
        <div class="modal-actions modal-actions--edit">
          <button type="button" class="tb-btn tb-btn-danger" id="editDeleteBtn">刪除商品</button>
          <button type="button" class="tb-btn" id="cancelEdit">取消</button>
          <button type="submit" class="gen-btn gen-btn-sm" id="editSubmitBtn">
            <span class="btn-text">儲存</span>
            <span class="btn-loading" hidden>儲存中...</span>
          </button>
        </div>
      </form>
    </div>
  </div>

  <div class="modal-overlay" id="passwordModal">
    <div class="modal">
      <div class="sec-label">更改密碼</div>
      <p class="modal-desc">變更 _null 管理員登入密碼</p>
      <form id="passwordForm">
        <label class="field-label" for="currentPassword">目前密碼</label>
        <input class="field-input" type="password" id="currentPassword" autocomplete="current-password" required>

        <label class="field-label" for="newPassword">新密碼</label>
        <input class="field-input" type="password" id="newPassword" autocomplete="new-password" minlength="4" required>

        <label class="field-label" for="confirmPassword">確認新密碼</label>
        <input class="field-input" type="password" id="confirmPassword" autocomplete="new-password" minlength="4" required>

        <div class="modal-actions">
          <button type="button" class="tb-btn" id="cancelPassword">取消</button>
          <button type="submit" class="gen-btn gen-btn-sm">儲存</button>
        </div>
      </form>
    </div>
  </div>

  <div class="modal-overlay" id="loginModal">
    <div class="modal">
      <div class="sec-label">_null</div>
      <p class="modal-desc">輸入密碼以管理商品</p>
      <form id="loginForm">
        <input class="field-input" type="password" id="adminPassword" placeholder="PASSWORD" autocomplete="current-password" required>
        <div class="modal-actions">
          <button type="button" class="tb-btn" id="cancelLogin">CANCEL</button>
          <button type="submit" class="gen-btn gen-btn-sm">LOGIN</button>
        </div>
      </form>
    </div>
  </div>

  <div class="toast" id="toast" hidden></div>

  <script src="app.js"></script>
</body>
</html>
